name: Property manager CI

on:
  push:
    paths:
      - 'apps/property-manager/**'
    branches:
      - main
      - prod
  pull_request:
    paths:
      - 'apps/property-manager/**'

jobs:
  code-checks:
      name: ⬣ ESLint & ʦ TypeScript
      runs-on: ubuntu-latest
      
      steps:
        - name: ⬇️ Checkout repo
          uses: actions/checkout@v4
  
        - name: ⎔ Setup node
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'yarn'
            cache-dependency-path: 'apps/property-manager/yarn.lock'
  
        - name: 📦 Cache node_modules
          id: cache-node-modules
          uses: actions/cache@v4
          with:
            path: apps/property-manager/node_modules
            key: ${{ runner.os }}-node-modules-${{ hashFiles('apps/property-manager/yarn.lock') }}
            restore-keys: |
              ${{ runner.os }}-node-modules-

        - name: 📥 Download deps
          if: steps.cache-node-modules.outputs.cache-hit != 'true'
          run: yarn install --frozen-lockfile
          working-directory: apps/property-manager

        - name: 🔬 Lint
          run: yarn lint:ci
          working-directory: apps/property-manager

        - name: 🔎 Type check
          run: yarn types:check
          working-directory: apps/property-manager
