name: Admin CI

on:
  push:
    paths:
      - 'apps/admin/**'
    branches:
      - main
      - prod
  pull_request:
    paths:
      - 'apps/admin/**'

jobs:
  code-checks:
      name: ⬣ ESLint & ʦ TypeScript
      runs-on: ubuntu-latest

      steps:
        - name: ⬇️ Checkout repo
          uses: actions/checkout@v4

        - name: ⎔ Setup node
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'yarn'
            cache-dependency-path: 'apps/admin/yarn.lock'

        - name: 📦 Cache node_modules
          id: cache-node-modules
          uses: actions/cache@v4
          with:
            path: apps/admin/node_modules
            key: ${{ runner.os }}-node-modules-${{ hashFiles('apps/admin/yarn.lock') }}
            restore-keys: |
              ${{ runner.os }}-node-modules-

        - name: 📥 Download deps
          if: steps.cache-node-modules.outputs.cache-hit != 'true'
          run: yarn install --frozen-lockfile
          working-directory: apps/admin

        - name: 🔬 Lint
          run: yarn lint
          working-directory: apps/admin

        - name: 🔎 Type check
          run: yarn typecheck
          working-directory: apps/admin
