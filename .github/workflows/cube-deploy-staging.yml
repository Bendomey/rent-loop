name: Deploy CUBE Staging

on:
  push:
    paths:
      - 'services/cube/**'
    branches:
      - main

jobs:
  deploy:
    name: ⚙️ Build And Deploy Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    concurrency: deploy-cube-group
    defaults:
      run:
        working-directory: services/cube
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: 🚀 Deploy Staging
        run: flyctl deploy --config fly.toml --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
