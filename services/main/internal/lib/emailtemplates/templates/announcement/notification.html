{{define "preview"}}New announcement from your property manager.{{end}}
{{define "content"}}
<h1 class="headline" style="margin:0 0 14px;font-family:'DM Serif Display',Georgia,'Times New Roman',serif;font-size:28px;font-weight:400;color:#111110;line-height:1.2;letter-spacing:0.2px;">{{.Data.AnnouncementTitle}}</h1>
<p style="margin:0 0 8px;font-family:'DM Sans',Arial,sans-serif;font-size:12px;color:#aaaaaa;line-height:1.6;text-transform:uppercase;letter-spacing:0.8px;">{{.Data.AnnouncementType}}</p>

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
  <tr>
    <td style="background:#F8F7F4;border-radius:8px;border:1px solid #EAEAE8;padding:20px 18px;">
      <p style="margin:0;font-family:'DM Sans',Arial,sans-serif;font-size:14.5px;color:#444444;line-height:1.7;">{{.Data.AnnouncementContent}}</p>
    </td>
  </tr>
</table>

<p style="margin:0;font-family:'DM Sans',Arial,sans-serif;font-size:12.5px;color:#aaaaaa;line-height:1.6;">You can also view this announcement in the Rentloop app for more details.</p>
{{end}}
