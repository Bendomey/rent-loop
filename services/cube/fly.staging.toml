app = 'rentloop-cube-staging'
primary_region = 'lhr'

[build]

[env]
  PORT = '4000'
  CUBEJS_DEV_MODE = 'false'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
